<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Injury Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

  <nav>
    <div class="logo-area">
      <img src="desmonlogo1.jpg" class="logo">
      <h2>SPORT HUB</h2>
    </div>

    <div class="nav-links">
      <a href="#analysis">Analysis</a>
      <a href="#signin">Sign In</a>
    </div>
  </nav>

  <div class="hero-text">
    <h1>Train Smart. Recover Strong.</h1>
    <p>Elite injury analysis for athletes</p>
    <a href="#analysis" class="btn">Start Analysis</a>
  </div>

</header>

<section id="analysis" class="section">

  <h2>Injury Analysis System</h2>

  <div class="card">

    <label>Sport</label>
    <select id="sport">
      <option>Football</option>
      <option>Volleyball</option>
      <option>Handball</option>
      <option>Swimming</option>
      <option>Rugby</option>
    </select>

    <label>Injury</label>
    <select id="injury">
      <option>Strain</option>
      <option>Sprain</option>
      <option>Dislocation</option>
      <option>Fracture</option>
    </select>

    <button class="btn" onclick="getAdvice()">Get Report</button>

  </div>

  <div id="result" class="result"></div>

</section>

<section id="signin" class="section dark">

  <h2>Player Sign In</h2>

  <div class="card">

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button class="btn secondary">Sign In</button>

  </div>

</section>

</body>
</html>
