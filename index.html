<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Rehab System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
  <div class="overlay">

    <nav>
      <div class="logo">
        <img src="desmonlogo1.jpg">
        <h2>SPORTS REHAB</h2>
      </div>
    </nav>

    <div class="hero-text">
      <h1>Recover Like a Professional Athlete</h1>
      <p>Structured rehab plans for sports injuries</p>
    </div>

  </div>
</header>

<section class="container">

  <h2>Injury Rehab System</h2>

  <div class="card">

    <select id="sport">
      <option>Football</option>
      <option>Volleyball</option>
      <option>Handball</option>
      <option>Swimming</option>
      <option>Rugby</option>
    </select>

    <select id="injury">
      <option>Strain</option>
      <option>Sprain</option>
      <option>Dislocation</option>
      <option>Fracture</option>
    </select>

    <select id="level">
      <option>Mild</option>
      <option>Moderate</option>
      <option>Severe</option>
    </select>

    <button onclick="getRehab()">Generate Rehab Plan</button>

  </div>

  <div id="result" class="result"></div>

</section>

<script src="script.js"></script>
</body>
</html>
