<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Performance Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">

  <div class="nav">
    <div class="logo">ATHLETE HUB</div>

    <div class="links">
      <a href="#home">Home</a>
      <a href="#analysis">Injury Analysis</a>
      <a href="#login">Sign In</a>
    </div>
  </div>

  <section class="hero" id="home">
    <h1>Elite Sports Injury & Performance System</h1>
    <p>Analyze injuries. Prevent damage. Improve recovery.</p>
    <a href="#analysis" class="btn">Start Analysis</a>
  </section>

</header>

<!-- ANALYSIS -->
<section class="section" id="analysis">

  <h2>Injury Analysis Tool</h2>

  <div class="panel">

    <label>Sport</label>
    <select id="sport">
      <option>Football</option>
      <option>Volleyball</option>
      <option>Handball</option>
      <option>Swimming</option>
      <option>Rugby</option>
    </select>

    <label>Injury Type</label>
    <select id="injury">
      <option>Strain</option>
      <option>Sprain</option>
      <option>Dislocation</option>
      <option>Fracture</option>
    </select>

    <button onclick="getAdvice()">Generate Report</button>

  </div>

  <div class="result" id="result">Your report will appear here...</div>

</section>

<!-- SIGN IN -->
<section class="login" id="login">

  <h2>Member Access</h2>

  <div class="panel">

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Sign In</button>

  </div>

</section>

<footer>
  © 2026 Athlete Performance Hub
</footer>

<script src="script.js"></script>
</body>
</html>
