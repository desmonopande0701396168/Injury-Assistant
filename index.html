<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Injury Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <h1>🏥 Injury Assistant For all Athletes</h1>

  <!-- Sport -->
  <div class="section">
    <h2>Select Sport</h2>
    <div class="options" id="sport">
      <button onclick="selectOption(this, 'sport')">⚽ Football</button>
      <button onclick="selectOption(this, 'sport')">🏉 Rugby</button>
      <button onclick="selectOption(this, 'sport')">🤾 Handball</button>
      <button onclick="selectOption(this, 'sport')">🏊 Swimming</button>
      <button onclick="selectOption(this, 'sport')">🏐 Volleyball</button> 
    </div>
  </div>

  <!-- Injury -->
  <div class="section">
    <h2>Select Injury</h2>
    <div class="options" id="injury">
      <button onclick="selectOption(this, 'injury')">Sprain</button>
      <button onclick="selectOption(this, 'injury')">Strain</button>
      <button onclick="selectOption(this, 'injury')">Dislocation</button>
    </div>
  </div>

  <!-- Pain Level -->
  <div class="section">
    <h2>Pain Level</h2>
    <div class="options" id="pain">
      <button onclick="selectOption(this, 'pain')">Mild</button>
      <button onclick="selectOption(this, 'pain')">Moderate</button>
      <button onclick="selectOption(this, 'pain')">Severe</button>
    </div>
  </div>

  <button class="main-btn" onclick="getAdvice()">Get Advice</button>

  <!-- Result -->
  <div id="result" class="result"></div>

  <!-- 👇 CREATED BY OPANDE ADDED HERE -->
  <p class="creator">Created by M.R Christopher Opande</p>

</div>

<script>
let selections = {
  sport: "",
  injury: "",
  pain: ""
};

function selectOption(button, category) {
  const parent = button.parentElement;
  Array.from(parent.children).forEach(btn => btn.classList.remove("active"));
  button.classList.add("active");
  selections[category] = button.innerText;
}

function getAdvice() {
  let injury = selections.injury;
  let pain = selections.pain;

  if (!injury || !pain) {
    document.getElementById("result").innerHTML = "⚠️ Please select all options.";
    return;
  }

  let output = "";

  if (injury.includes("Sprain")) {
    output = `
    <h3>🦶 SPRAIN</h3>
    <p><strong>Cause:</strong> Twisting ankle on uneven or muddy ground
    Falls or direct blows to the joint
    Overstretching during physical activity
    Awkward landings from jumps.</p>
    <p><strong>What to do:</strong> Stop activity immediately.
    Rest: Avoid using or putting weight on the injured joint to prevent further damage.
    </p>
    <p><strong>Procedure:</strong></p>
    <ul>
      <li>Apply ice (10–20 min)</li>
      <li>Use compression bandage</li>
      <li>Elevate leg</li>
      <li>Rest for 48 hours</li>
    </ul>
    <p><strong>Prevention:</strong> Warm up, proper boots, safe field.</p>
    `;
  }
 
  if (injury.includes("Strain")) {
    output = `
    <h3>💪 STRAIN</h3>
    <p><strong>Cause:</strong> Overstretching muscles during sprinting.</p>
    <p><strong>What to do:</strong> Stop movement immediately.</p>
    <p><strong>Procedure:</strong></p>
    <ul>
      <li>Rest muscle</li>
      <li>Apply ice</li>
      <li>Gentle stretching after recovery</li>
    </ul>
    <p><strong>Prevention:</strong> Proper warm-up and conditioning.</p>
    `;
  }

  if (injury.includes("Dislocation")) {
    output = `
    <h3>⚠️ DISLOCATION</h3>
    <p><strong>Cause:</strong> Hard fall or collision.</p>
    <p><strong>What to do:</strong> DO NOT move the joint.</p>
    <p><strong>Procedure:</strong></p>
    <ul>
      <li>Immobilize the area</li>
      <li>Apply ice</li>
      <li>Seek medical help immediately</li>
    </ul>
    <p><strong>Prevention:</strong> Strength training and safe play.</p>
    `;
  }

  document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
